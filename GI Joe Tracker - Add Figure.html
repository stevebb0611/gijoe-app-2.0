<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>G.I. Joe Tracker — Add Figure</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="add-figure.css" />
<style>
  :root {
    --paper: #f3eee2; --card: #e9e2d2; --ink: #211f1a; --ink-soft: #56503f;
    --line: rgba(33,31,26,.55); --line-soft: rgba(33,31,26,.22);
    --accent: #6b6f39; --ok: #5d7d4d; --olive: #5f6b39; --crimson: #a23a2c;
    --font-display: 'Oswald', sans-serif; --font-mono: 'Space Mono', monospace;
    --shadow: 3px 3px 0 var(--ink);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); min-height: 100vh; }
  /* shared faction tag (matches Inventory) */
  .wf-fac { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 1px; padding: 2px 7px; border: 1.5px solid var(--ink); color: #fff; display: inline-block; text-align: center; min-width: 94px; line-height: 1.3; box-sizing: border-box; }
  .wf-fac--joe { background: var(--olive); }
  .wf-fac--cobra { background: var(--crimson); }
  .wf-fac--mini { font-size: 9px; padding: 1px 5px; min-width: 84px; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#f3eee2"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="#211f1a" stroke-width="3"/>
    <line x1="50" y1="40" x2="50" y2="60" stroke="#6b6f39" stroke-width="5"/>
    <line x1="40" y1="50" x2="60" y2="50" stroke="#6b6f39" stroke-width="5"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="add-figure-catalog.js"></script>
<script src="assets/figure-masks.js"></script>
<script src="assets/figure-zones.js"></script>
<script type="text/babel" src="damage-map.jsx"></script>
<script type="text/babel" src="add-figure.jsx"></script>
<script type="text/babel">
  const { AddFigure } = window;
  // Standalone host: the pop-out modal renders over the paper backdrop;
  // closing returns to the Inventory (the modal is normally launched from there).
  ReactDOM.createRoot(document.getElementById('root')).render(
    <AddFigure onClose={() => { window.location.href = 'GI Joe Tracker - Inventory.html'; }} />
  );
</script>
</body>
</html>
