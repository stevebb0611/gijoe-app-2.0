<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>G.I. Joe Tracker — Add Instance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f3eee2; --card: #e9e2d2; --ink: #211f1a; --ink-soft: #56503f;
    --line: rgba(33,31,26,.55); --line-soft: rgba(33,31,26,.22);
    --accent: #6b6f39; --ok: #5d7d4d; --olive: #5f6b39; --crimson: #a23a2c;
    --font-display: 'Oswald', sans-serif; --font-mono: 'Space Mono', monospace;
    --shadow: 3px 3px 0 var(--ink);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); }
  .af { color: var(--ink); font-family: var(--font-mono); font-size: 13px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  .wf-fac { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 1px; padding: 2px 7px; border: 1.5px solid var(--ink); color: #fff; display: inline-block; line-height: 1.3; }
  .wf-fac--joe { background: var(--olive); }
  .wf-fac--cobra { background: var(--crimson); }
  .wf-fac--mini { font-size: 9px; padding: 1px 5px; }

  /* segmented control (used by the damage map) */
  .seg { display: inline-flex; border: 1.5px solid var(--ink); }
  .seg button { font: inherit; font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: .5px; padding: 5px 11px; background: var(--paper); color: var(--ink-soft); border: none; cursor: pointer; }
  .seg button.is-on { background: var(--ink); color: var(--paper); }
  .seg button + button { border-left: 1.5px solid var(--ink); }
  .seg--sm button { padding: 4px 9px; font-size: 10px; }

  /* header */
  .af-top { width: 100%; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 12px 26px; background: var(--ink); color: var(--paper); }
  .af-back { font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: .5px; color: rgba(255,255,255,.7); text-decoration: none; }
  .af-back:hover { color: #fff; }
  .af-title { font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: 3px; text-align: center; }
  .af-demo { justify-self: end; display: flex; align-items: center; gap: 8px; }
  .af-demo__lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: rgba(255,255,255,.45); }
  .af-demo select { font: inherit; font-family: var(--font-mono); font-size: 11px; background: rgba(255,255,255,.08); color: var(--paper); border: 1.5px solid rgba(255,255,255,.3); padding: 4px 8px; }

  /* card */
  .af-card { width: 100%; max-width: 880px; margin: 26px 20px; border: 2px solid var(--ink); background: var(--card); box-shadow: 6px 6px 0 rgba(33,31,26,.5); display: flex; flex-direction: column; }

  /* stepper */
  .af-steps { display: grid; grid-template-columns: repeat(2, 1fr); border-bottom: 2px solid var(--ink); }
  .af-step { display: flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 1.5px; padding: 12px 8px; background: var(--paper); color: var(--ink-soft); border: none; border-right: 1.5px solid var(--line-soft); cursor: pointer; }
  .af-step:last-child { border-right: none; }
  .af-step.is-on { background: var(--ink); color: var(--paper); }
  .af-step.is-done { color: var(--ink); }
  .af-step:disabled { opacity: .5; cursor: default; }
  .af-step__n { width: 18px; height: 18px; border: 1.5px solid currentColor; border-radius: 50%; display: grid; place-items: center; font-family: var(--font-mono); font-size: 10px; }
  .af-step.is-on .af-step__n { background: var(--accent); border-color: var(--accent); color: #fff; }
  .af-step.is-done .af-step__n { background: var(--ok); border-color: var(--ok); color: #fff; }

  .af-body { padding: 20px 22px; min-height: 380px; }

  /* figure context */
  .af-fig { display: flex; gap: 14px; align-items: center; border: 1.5px solid var(--ink); background: var(--paper); padding: 12px; margin-bottom: 18px; }
  .af-fig__thumb { width: 52px; height: 52px; flex: none; border: 1.5px solid var(--ink); background-color: var(--card); background-image: repeating-linear-gradient(45deg, transparent 0 7px, var(--line-soft) 7px 8px); }
  .af-fig__name { font-family: var(--font-display); font-weight: 700; font-size: 19px; display: flex; align-items: center; gap: 10px; }
  .af-fig__var { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .af-fig__inst { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); margin-top: 5px; }
  .af-fig__inst b { color: var(--ink); }

  /* blocks within a step */
  .af-block { padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px dashed var(--line-soft); }
  .af-block--last { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .af-seclab { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; color: var(--ink-soft); margin: 0 0 10px; }
  .af-seclab b { color: var(--ink); }

  /* variant picker */
  .af-varpick { display: flex; flex-direction: column; gap: 6px; }
  .af-var { display: grid; grid-template-columns: 16px auto 1fr auto; gap: 10px; align-items: center; text-align: left; font: inherit; background: var(--paper); border: 1.5px solid var(--line); padding: 8px 11px; cursor: pointer; color: var(--ink); }
  .af-var:hover { border-color: var(--ink); }
  .af-var.is-sel { border: 2px solid var(--accent); background: var(--card); }
  .af-var__radio { width: 14px; height: 14px; border: 1.5px solid var(--ink); border-radius: 50%; flex: none; }
  .af-var.is-sel .af-var__radio { background: var(--accent); box-shadow: inset 0 0 0 2.5px var(--paper); border-color: var(--accent); }
  .af-var__lab { font-family: var(--font-display); font-weight: 700; font-size: 13px; white-space: nowrap; }
  .af-var__tell { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .af-var__own { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--ink-soft); white-space: nowrap; }

  /* accessories — columned list with per-unit checkboxes */
  .af-acc { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 2px 22px; }
  .af-acc__row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 7px 0; border-bottom: 1px dashed var(--line-soft); min-height: 38px; }
  .af-acc__n { font-size: 12px; line-height: 1.2; }
  .af-acc__left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .af-acc__row.is-done .af-acc__n { color: var(--ink-soft); }
  .af-acc__q { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); }
  .af-acc__right { display: flex; align-items: center; gap: 9px; }
  .af-acc__boxes { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; max-width: 82px; }
  .af-unit { width: 22px; height: 22px; flex: none; border: 1.5px solid var(--ink); background: var(--paper); cursor: pointer; display: grid; place-items: center; font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: transparent; padding: 0; }
  .af-unit.is-on { background: var(--ok); color: #fff; }
  .af-unit:hover { border-color: var(--accent); }
  .af-acc__count { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--ink-soft); min-width: 30px; text-align: right; }
  .af-acc__count.is-done { color: var(--ok); }
  .af-acc__pull { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: .3px; color: var(--accent); background: var(--paper); border: 1.5px dashed var(--accent); padding: 2px 6px; cursor: pointer; white-space: nowrap; }
  .af-acc__pull:hover { background: var(--accent); color: #fff; }

  /* location input */
  .af-in { width: 100%; background: var(--paper); border: 1.5px solid var(--ink); padding: 9px 11px; font: inherit; font-size: 12px; color: var(--ink); }

  /* ===== condition step (two columns) ===== */
  .af-cond { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
  .af-cond__side { display: flex; flex-direction: column; gap: 12px; }

  /* damage map */
  .dm { display: flex; flex-direction: column; gap: 10px; }
  .dm-head { display: flex; align-items: center; justify-content: space-between; gap: 6px; flex-wrap: wrap; }
  .dm-title { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 1.5px; color: var(--ink-soft); }
  .dm-stage { position: relative; width: 100%; height: min(54vh, 460px); aspect-ratio: 200 / 440; margin: 0 auto; background: var(--card); border: 2px solid var(--ink); box-shadow: var(--shadow); background-image: repeating-linear-gradient(45deg, transparent 0 9px, var(--line-soft) 9px 10px); }
  .dm-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .dm-svg .dm-fill { fill: var(--paper); }
  .dm-svg .dm-limb { fill: none; }
  .dm-backtag { position: absolute; top: 8px; right: 10px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--ink-soft); border: 1px solid var(--line-soft); padding: 2px 6px; background: var(--paper); }
  .dm-region { position: absolute; transform: translate(-50%,-50%); border: 1.2px dashed transparent; background: var(--pc); cursor: pointer; padding: 0; transition: background .12s, border-color .12s; opacity: .55; }
  .dm-region:hover { border-color: var(--line); }
  .dm-region.is-painted { opacity: .4; }
  .dm-region__sev { position: absolute; right: -7px; bottom: -7px; width: 15px; height: 15px; border-radius: 50%; color: #fff; font-family: var(--font-mono); font-weight: 700; font-size: 9px; display: grid; place-items: center; border: 1.5px solid var(--ink); }
  .dm-node { position: absolute; transform: translate(-50%,-50%); width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--ink); background: var(--nc); cursor: pointer; font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: #fff; display: grid; place-items: center; padding: 0; box-shadow: 1px 1px 0 var(--ink); z-index: 2; transition: transform .1s; }
  .dm-node:hover { transform: translate(-50%,-50%) scale(1.18); }
  .dm-node:not(.is-hit) { color: transparent; }
  .dm-node.is-sel { outline: 3px solid var(--accent); outline-offset: 2px; }
  .dm-legend { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 10px; color: var(--ink-soft); }
  .dm-legend__lab { font-weight: 700; letter-spacing: 1px; }
  .dm-legend__i { display: inline-flex; align-items: center; gap: 5px; }
  .dm-legend__i i { width: 11px; height: 11px; border: 1.5px solid var(--ink); display: inline-block; }
  .dm-legend__hint { width: 100%; font-size: 9px; letter-spacing: .5px; }

  /* panels (condition side) */
  .panel { border: 1.5px solid var(--ink); background: var(--card); box-shadow: var(--shadow); }
  .panel__hd { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 1px; padding: 9px 12px; background: var(--ink); color: var(--paper); }
  .panel__hd em { font-style: normal; font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; opacity: .65; font-weight: 400; }
  .panel__x { margin-left: auto; background: transparent; border: none; color: var(--paper); cursor: pointer; font-size: 12px; }
  .panel__note { font-size: 10px; color: var(--ink-soft); line-height: 1.5; padding: 9px 12px 12px; }
  .panel__note b { color: var(--ink); }

  .grades { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .grade { border: 1.5px solid var(--ink); background: var(--paper); padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .grade__kind { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--ink-soft); }
  .grade__val { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: .5px; color: #fff; padding: 4px 12px; align-self: flex-start; width: fit-content; line-height: 1.15; }
  .grade__score { font-family: var(--font-mono); font-size: 9px; color: var(--ink-soft); letter-spacing: .3px; }

  .panel--log { outline: 2px solid var(--accent); outline-offset: -1px; }
  .logger { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
  .logger__row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .logger__type { font-size: 12px; }
  .logger__sevs { display: flex; gap: 5px; }
  .logger__sev { width: 26px; height: 24px; border: 1.5px solid var(--ink); background: var(--paper); cursor: pointer; font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--ink); }
  .logger__sev:hover { background: var(--sc); color: #fff; }
  .logger__existing { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 12px; }
  .tagmark { display: inline-flex; align-items: center; gap: 6px; border: 1.5px solid var(--ink); background: var(--paper); font-size: 10px; padding: 3px 6px; }
  .tagmark i { width: 9px; height: 9px; }
  .tagmark button { background: transparent; border: none; cursor: pointer; color: var(--ink-soft); font-size: 10px; }

  .af-notes { width: 100%; min-height: 84px; resize: vertical; background: var(--paper); border: none; border-top: 1.5px solid transparent; padding: 11px 12px; font: inherit; font-size: 12px; color: var(--ink); }
  .af-notes:focus { outline: 2px solid var(--accent); outline-offset: -2px; }

  .af-add { width: 100%; margin-top: 4px; font-family: var(--font-display); font-weight: 700; letter-spacing: 1.5px; font-size: 14px; background: var(--accent); color: #fff; border: none; padding: 14px; cursor: pointer; }

  /* success */
  .af-okwrap { text-align: center; padding: 26px 8px; }
  .af-ok { width: 56px; height: 56px; border-radius: 50%; background: var(--ok); color: #fff; font-size: 28px; display: grid; place-items: center; margin: 8px auto 14px; border: 2px solid var(--ink); }
  .af-ok__h { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: 1px; }
  .af-ok__sub { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }
  .af-ok__btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
  .af-okbtn { font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 1px; padding: 9px 14px; border: 1.5px solid var(--ink); background: var(--paper); color: var(--ink); cursor: pointer; text-decoration: none; }
  .af-okbtn--go { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* footer */
  .af-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 22px; border-top: 2px solid var(--ink); background: var(--paper); }
  .af-foot__mid { font-size: 10px; color: var(--ink-soft); letter-spacing: .5px; }
  .af-nav { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 1px; padding: 9px 18px; background: var(--ink); color: var(--paper); border: none; cursor: pointer; }
  .af-nav--ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
  .af-nav:disabled { opacity: .4; cursor: default; }

  @media (max-width: 760px) {
    .af-acc { grid-template-columns: 1fr; }
    .af-cond { grid-template-columns: 1fr; }
    .af-cond__map { max-width: 340px; margin: 0 auto; }
  }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#f3eee2"/>
    <rect x="24" y="30" width="34" height="40" fill="none" stroke="#211f1a" stroke-width="3"/>
    <rect x="42" y="38" width="34" height="40" fill="#e9e2d2" stroke="#211f1a" stroke-width="3"/>
    <line x1="59" y1="48" x2="59" y2="68" stroke="#6b6f39" stroke-width="5"/>
    <line x1="49" y1="58" x2="69" y2="58" stroke="#6b6f39" stroke-width="5"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</body>
</html>
