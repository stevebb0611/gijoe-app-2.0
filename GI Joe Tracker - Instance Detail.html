<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>G.I. Joe Tracker — Instance Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f3eee2;
    --card: #e9e2d2;
    --ink: #211f1a;
    --ink-soft: #56503f;
    --line: rgba(33,31,26,.55);
    --line-soft: rgba(33,31,26,.22);
    --accent: #6b6f39;
    --ok: #5d7d4d;
    --olive: #5f6b39;
    --crimson: #a23a2c;
    --font-display: 'Oswald', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --shadow: 3px 3px 0 var(--ink);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); }
  .idp { color: var(--ink); font-family: var(--font-mono); font-size: 13px; min-height: 100vh; }

  .wf-fac { font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: 1px; padding: 1px 6px; border: 1.5px solid var(--ink); color: #fff; display: inline-block; line-height: 1.4; }
  .wf-fac--joe { background: var(--olive); }
  .wf-fac--cobra { background: var(--crimson); }

  /* segmented controls */
  .seg { display: inline-flex; border: 1.5px solid var(--ink); }
  .seg button { font: inherit; font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: .5px; padding: 5px 11px; background: var(--paper); color: var(--ink-soft); border: none; cursor: pointer; }
  .seg button.is-on { background: var(--ink); color: var(--paper); }
  .seg button + button { border-left: 1.5px solid var(--ink); }
  .seg--sm button { padding: 4px 9px; font-size: 10px; }
  .seg .seg--add { color: var(--ink); }

  /* ===== header ===== */
  .idp-top { display: flex; justify-content: space-between; align-items: center; gap: 18px; flex-wrap: wrap; padding: 12px 26px; background: var(--ink); color: var(--paper); }
  .idp-crumb { display: flex; align-items: center; gap: 10px; }
  .idp-back { font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: .5px; background: transparent; border: 1.5px solid rgba(255,255,255,.35); color: var(--paper); padding: 5px 10px; cursor: pointer; }
  .idp-crumb__sep { opacity: .4; }
  .idp-crumb__fig { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: 1px; }
  .idp-crumb__var { font-size: 11px; color: rgba(255,255,255,.6); letter-spacing: .5px; }
  .idp-inst { display: flex; align-items: center; gap: 12px; }
  .idp-inst .seg button { background: rgba(255,255,255,.08); color: rgba(255,255,255,.6); }
  .idp-inst .seg button.is-on { background: var(--accent); color: #fff; }
  .idp-prim { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 1px; padding: 6px 12px; cursor: pointer; border: 1.5px solid rgba(255,255,255,.35); background: transparent; color: rgba(255,255,255,.7); }
  .idp-prim.is-on { background: var(--ok); border-color: var(--ok); color: #fff; }

  /* ===== body layout ===== */
  .idp-body { display: grid; grid-template-columns: 420px 1fr; gap: 0; align-items: start; }
  .idp-map { padding: 22px 24px; border-right: 2px solid var(--ink); position: sticky; top: 0; }
  .idp-side { padding: 18px 24px 80px; display: flex; flex-direction: column; gap: 14px; }

  /* ===== damage map ===== */
  .dm { display: flex; flex-direction: column; gap: 12px; }
  .dm-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .dm-title { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 1.5px; color: var(--ink-soft); }
  .dm-stage { position: relative; width: auto; height: min(62vh, 540px); aspect-ratio: 200 / 440; margin: 0 auto; background: var(--card); border: 2px solid var(--ink); box-shadow: var(--shadow);
    background-image: repeating-linear-gradient(45deg, transparent 0 9px, var(--line-soft) 9px 10px); }
  .dm-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .dm-svg .dm-fill { fill: var(--paper); }
  .dm-svg .dm-limb { fill: none; }
  .dm-backtag { position: absolute; top: 8px; right: 10px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--ink-soft); border: 1px solid var(--line-soft); padding: 2px 6px; background: var(--paper); }

  .dm-region { position: absolute; transform: translate(-50%,-50%); border: 1.2px dashed transparent; background: var(--pc); cursor: pointer; padding: 0;
    transition: background .12s, border-color .12s; opacity: .55; }
  .dm-region:hover { border-color: var(--line); }
  .dm-region.is-painted { opacity: .4; }
  .dm-region__sev { position: absolute; right: -7px; bottom: -7px; width: 15px; height: 15px; border-radius: 50%; color: #fff; font-family: var(--font-mono); font-weight: 700; font-size: 9px; display: grid; place-items: center; border: 1.5px solid var(--ink); opacity: 2.5; }

  .dm-node { position: absolute; transform: translate(-50%,-50%); width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--ink); background: var(--nc); cursor: pointer;
    font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: #fff; display: grid; place-items: center; padding: 0; box-shadow: 1px 1px 0 var(--ink); z-index: 2; transition: transform .1s; }
  .dm-node:hover { transform: translate(-50%,-50%) scale(1.18); }
  .dm-node.is-hit { color: #fff; }
  .dm-node:not(.is-hit) { color: transparent; }
  .dm-node.is-sel { outline: 3px solid var(--accent); outline-offset: 2px; }

  .dm-legend { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 10px; color: var(--ink-soft); }
  .dm-legend__lab { font-weight: 700; letter-spacing: 1px; }
  .dm-legend__i { display: inline-flex; align-items: center; gap: 5px; }
  .dm-legend__i i { width: 11px; height: 11px; border: 1.5px solid var(--ink); display: inline-block; }
  .dm-legend__hint { margin-left: auto; font-size: 9px; letter-spacing: .5px; }

  /* ===== panels ===== */
  .panel { border: 1.5px solid var(--ink); background: var(--card); box-shadow: var(--shadow); }
  .panel__hd { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 1px; padding: 9px 12px; background: var(--ink); color: var(--paper); }
  .panel__hd em { font-style: normal; font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; opacity: .65; font-weight: 400; }
  .panel__x { margin-left: auto; background: transparent; border: none; color: var(--paper); cursor: pointer; font-size: 12px; }
  .panel__note { font-size: 10px; color: var(--ink-soft); line-height: 1.5; padding: 8px 12px 12px; }

  /* grades */
  .grades { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .grade { border: 1.5px solid var(--ink); background: var(--paper); padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .grade__kind { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--ink-soft); }
  .grade__val { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: .5px; color: #fff; padding: 4px 12px; align-self: flex-start; width: fit-content; line-height: 1.15; }
  .grade__score { font-family: var(--font-mono); font-size: 9px; color: var(--ink-soft); letter-spacing: .3px; }

  /* logger */
  .panel--log { outline: 2px solid var(--accent); outline-offset: -1px; }
  .logger { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
  .logger__row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .logger__type { font-size: 12px; }
  .logger__sevs { display: flex; gap: 5px; }
  .logger__sev { width: 26px; height: 24px; border: 1.5px solid var(--ink); background: var(--paper); cursor: pointer; font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--ink); }
  .logger__sev:hover { background: var(--sc); color: #fff; }
  .logger__existing { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 12px; }
  .tagmark { display: inline-flex; align-items: center; gap: 6px; border: 1.5px solid var(--ink); background: var(--paper); font-size: 10px; padding: 3px 6px; }
  .tagmark i { width: 9px; height: 9px; }
  .tagmark button { background: transparent; border: none; cursor: pointer; color: var(--ink-soft); font-size: 10px; }

  /* damage log table */
  .dlog { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 11px; }
  .dlog th { text-align: left; font-size: 8px; letter-spacing: 1px; color: var(--ink-soft); padding: 8px 12px 4px; font-weight: 700; }
  .dlog td { padding: 5px 12px; border-top: 1px dashed var(--line-soft); }
  .dlog tr.is-paint td { color: var(--ink-soft); }
  .sevdot { display: inline-grid; place-items: center; width: 17px; height: 17px; border-radius: 50%; color: #fff; font-weight: 700; font-size: 9px; border: 1.5px solid var(--ink); }
  .dlog__x { background: transparent; border: none; cursor: pointer; color: var(--ink-soft); }
  .dlog__empty { text-align: center; color: var(--ink-soft); font-style: italic; padding: 16px 12px; }

  /* accessories */
  .acc { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
  .acc__row { display: grid; grid-template-columns: 20px 1fr auto; align-items: center; gap: 10px; }
  .acc__ck { width: 18px; height: 18px; border: 1.5px solid var(--ink); background: var(--paper); cursor: pointer; font-size: 11px; font-weight: 700; display: grid; place-items: center; padding: 0; }
  .acc__row.is-have .acc__ck { background: var(--ok); color: #fff; }
  .acc__n { font-size: 12px; }
  .acc__row.is-have .acc__n { color: var(--ink-soft); }
  .acc__tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ok); }
  .acc__need { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); }
  .acc__pull { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--accent); background: var(--paper); border: 1.5px dashed var(--accent); padding: 3px 8px; cursor: pointer; }
  .bin { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; padding: 10px 12px; border-top: 1px dashed var(--line-soft); }
  .bin__hd { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: var(--ink-soft); }
  .bin__chip { font-family: var(--font-mono); font-size: 10px; border: 1.5px solid var(--line); background: var(--paper); padding: 3px 8px; }
  .bin__chip b { color: var(--accent); }

  /* ===== Mint on Card (MOC) — sealed override ===== */
  .id-moc { display: flex; align-items: flex-start; gap: 11px; padding: 12px 14px; border: 1.5px solid var(--ink); background: var(--paper); cursor: pointer; }
  .id-moc.is-on { background: var(--ink); color: var(--paper); }
  .id-moc input { position: absolute; opacity: 0; width: 0; height: 0; }
  .id-moc__box { flex: none; width: 20px; height: 20px; margin-top: 1px; border: 1.5px solid currentColor; display: grid; place-items: center; font-family: var(--font-mono); font-weight: 700; font-size: 12px; }
  .id-moc.is-on .id-moc__box { background: var(--paper); color: var(--ink); border-color: var(--paper); }
  .id-moc__txt { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .id-moc__txt b { font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: .3px; line-height: 1.2; }
  .id-moc__abbr { display: inline-block; font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: 1px; border: 1.5px solid currentColor; padding: 1px 5px; margin-left: 8px; vertical-align: 2px; }
  .id-moc__txt i { display: block; font-style: normal; font-size: 11.5px; line-height: 1.5; color: var(--ink-soft); }
  .id-moc.is-on .id-moc__txt i { color: rgba(243,238,226,.72); }
  .id-moc.is-on .id-moc__txt i b { color: var(--paper); }
  /* MOC grade badge in the CONDITION panel */
  .id-mocgrade { display: flex; align-items: center; gap: 12px; padding: 12px; }
  .id-mocgrade__badge { flex: none; font-family: var(--font-display); font-weight: 700; font-size: 15px; letter-spacing: 1px; color: #fff; background: var(--ok); border: 1.5px solid var(--ink); padding: 9px 12px; }
  .id-mocgrade__txt { display: flex; flex-direction: column; gap: 2px; }
  .id-mocgrade__txt b { font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: .3px; }
  .id-mocgrade__txt i { font-style: normal; font-size: 11px; color: var(--ink-soft); line-height: 1.4; }
  /* sealed accessory list */
  .acc.is-sealed { opacity: .55; pointer-events: none; }
  .acc.is-sealed .acc__tag { color: var(--ok); }
  /* sealed placeholder in place of the damage map */
  .id-sealed { display: flex; flex-direction: column; gap: 14px; align-items: center; text-align: center; padding: 20px 14px; }
  .id-sealed__card { width: 168px; aspect-ratio: 3 / 4; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px; padding: 0 14px; border: 2.5px solid var(--ink); background: repeating-linear-gradient(135deg, var(--paper) 0 10px, var(--line-soft) 10px 11px); box-shadow: var(--shadow); }
  .id-sealed__tag { font-family: var(--font-display); font-weight: 700; font-size: 15px; letter-spacing: .8px; line-height: 1.15; }
  .id-sealed__sub { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: var(--ink-soft); }
  .id-sealed p { font-size: 12px; line-height: 1.55; color: var(--ink-soft); max-width: 280px; margin: 0; }

  /* ===== file card ===== */
  .fc-hd-badge { margin-left: auto; font-family: var(--font-mono); font-weight: 700; font-size: 8px; letter-spacing: 1.5px; padding: 2px 7px; border: 1px solid; }
  .fc-hd-badge.on { color: #cfe0a8; border-color: rgba(207,224,168,.55); }
  .fc-hd-badge.off { color: rgba(243,238,226,.6); border-color: rgba(243,238,226,.3); border-style: dashed; }
  .fc { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .fc-have { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; font: inherit; border: 1.5px solid var(--ink); background: var(--paper); padding: 10px 12px; cursor: pointer; }
  .fc-have__ck { width: 22px; height: 22px; border: 1.5px solid var(--ink); background: var(--card); display: grid; place-items: center; font-size: 13px; font-weight: 700; color: var(--ink); flex: none; }
  .fc-have.is-on .fc-have__ck { background: var(--ok); color: #fff; }
  .fc-have__l { display: flex; flex-direction: column; gap: 2px; }
  .fc-have__t { font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: .5px; }
  .fc-have__s { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); }

  /* compact printing selector */
  .fc-pick { display: flex; flex-direction: column; gap: 7px; }
  .fc-selrow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .fc-sel-lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: var(--ink-soft); }
  .fc-selwrap { position: relative; display: inline-flex; }
  .fc-sel { font: inherit; font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .3px; color: var(--ink); background: var(--paper); border: 1.5px solid var(--ink); padding: 6px 30px 6px 10px; min-width: 168px; cursor: pointer; appearance: none; -webkit-appearance: none; border-radius: 0; }
  .fc-selwrap__c { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 10px; color: var(--ink-soft); }
  .fc-cat { font-family: var(--font-mono); font-size: 9px; letter-spacing: .5px; color: var(--accent); margin-left: auto; }
  .fc-tell { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); line-height: 1.45; }

  .fc-note { font-size: 10px; color: var(--ink-soft); line-height: 1.55; }
  .fc-note b { color: var(--ink); }

  /* meta */
  .panel--meta { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
  .metarow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .metarow__lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: var(--ink-soft); width: 64px; flex: none; }
  .metarow__in { flex: 1; min-width: 160px; background: var(--paper); border: 1.5px solid var(--ink); padding: 7px 10px; font: inherit; font-size: 12px; color: var(--ink); }
  .metarow__remove { font-family: var(--font-display); font-weight: 600; letter-spacing: 1px; font-size: 12px; padding: 8px 14px; background: var(--ink); color: var(--paper); border: none; cursor: pointer; }
  .metarow__hint { font-size: 9px; color: var(--ink-soft); flex: 1; min-width: 180px; }

  /* ===== this-copy metadata (location + notes) ===== */
  .idp-meta { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
  .idp-meta__field { display: flex; flex-direction: column; gap: 6px; }
  .idp-meta__lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: var(--ink-soft); }
  .idp-meta__in { width: 100%; box-sizing: border-box; background: var(--paper); border: 1.5px solid var(--ink); padding: 9px 11px; font: inherit; font-size: 12px; color: var(--ink); }
  .idp-meta__in:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  .idp-meta__in--area { min-height: 64px; resize: vertical; line-height: 1.5; }

  /* ===== remove flow ===== */
  .rm-back { position: fixed; inset: 0; background: rgba(33,31,26,.58); display: grid; place-items: center; z-index: 50; padding: 24px; }
  .rm { background: var(--paper); border: 2px solid var(--ink); box-shadow: 6px 6px 0 var(--ink); width: 100%; max-width: 540px; max-height: 88vh; display: flex; flex-direction: column; }
  .rm__top { background: var(--crimson); color: #fff; padding: 13px 18px; display: flex; align-items: center; gap: 12px; }
  .rm__top .mk { font-size: 18px; }
  .rm__title { font-family: var(--font-display); font-weight: 700; font-size: 17px; letter-spacing: 1px; flex: 1; }
  .rm__title em { font-style: normal; font-family: var(--font-mono); font-size: 10px; opacity: .85; letter-spacing: 0; display: block; margin-top: 1px; }
  .rm__x { background: transparent; border: none; color: rgba(255,255,255,.85); font-size: 16px; cursor: pointer; }
  .rm__warn { padding: 11px 18px; font-size: 11px; color: var(--ink-soft); line-height: 1.55; border-bottom: 1px dashed var(--line); }
  .rm__warn b { color: var(--ink); }
  .rm__sechd { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 18px 0; }
  .rm__sechd-t { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 1px; }
  .rm__bulk { display: inline-flex; border: 1.5px solid var(--ink); }
  .rm__bulk button { font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .5px; padding: 4px 8px; background: var(--paper); color: var(--ink-soft); border: none; cursor: pointer; }
  .rm__bulk button + button { border-left: 1.5px solid var(--ink); }
  .rm__list { padding: 10px 18px 4px; display: flex; flex-direction: column; gap: 8px; overflow: auto; }
  .rm__row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; border: 1.5px solid var(--line); background: var(--card); padding: 9px 11px; }
  .rm__n { font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: .5px; }
  .rm__meta { font-family: var(--font-mono); font-size: 9px; color: var(--ink-soft); letter-spacing: .5px; margin-top: 1px; }
  .rm__none { font-size: 11px; color: var(--ink-soft); font-style: italic; padding: 4px 2px 8px; }
  .split { display: inline-flex; border: 1.5px solid var(--ink); }
  .split button { font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: .5px; padding: 6px 9px; background: var(--paper); color: var(--ink-soft); border: none; cursor: pointer; }
  .split button + button { border-left: 1.5px solid var(--ink); }
  .split button.on-stay { background: var(--ok); color: #fff; }
  .split button.on-go { background: var(--crimson); color: #fff; }
  .rm__delete { padding: 8px 18px 0; }
  .rm__delete button { background: transparent; border: none; color: var(--ink-soft); font-family: var(--font-mono); font-size: 10px; text-decoration: underline; cursor: pointer; }
  .rm__delete button:hover { color: var(--crimson); }
  .rm__danger { padding: 18px; font-size: 12.5px; color: var(--ink); line-height: 1.65; }
  .rm__danger b { color: var(--crimson); }
  .rm__foot { padding: 12px 18px; border-top: 2px solid var(--ink); display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .rm__sum { font-size: 11px; color: var(--ink-soft); line-height: 1.4; }
  .rm__sum b { color: var(--ink); font-family: var(--font-mono); }
  .rm__acts { display: flex; gap: 8px; }
  .rm__btn { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 1px; padding: 9px 14px; cursor: pointer; border: 1.5px solid var(--ink); background: var(--paper); color: var(--ink); white-space: nowrap; }
  .rm__btn--go { background: var(--crimson); color: #fff; border-color: var(--crimson); }

  /* ===== result screen ===== */
  .rmdone-wrap { min-height: 100vh; display: grid; place-items: center; padding: 40px 24px; }
  .rmdone { width: 100%; max-width: 500px; border: 2px solid var(--ink); background: var(--card); box-shadow: 6px 6px 0 var(--ink); }
  .rmdone__top { background: var(--ink); color: var(--paper); padding: 16px 20px; display: flex; align-items: center; gap: 14px; }
  .rmdone__ic { width: 36px; height: 36px; flex: none; border: 2px solid var(--paper); display: grid; place-items: center; font-size: 17px; }
  .rmdone__h { font-family: var(--font-display); font-weight: 700; font-size: 19px; letter-spacing: .5px; line-height: 1.15; }
  .rmdone__h em { font-style: normal; display: block; font-family: var(--font-mono); font-size: 10px; opacity: .65; letter-spacing: 1px; margin-top: 3px; }
  .rmdone__body { padding: 18px 20px; display: flex; flex-direction: column; gap: 13px; }
  .rmdone__line { font-size: 12px; color: var(--ink-soft); line-height: 1.55; }
  .rmdone__line b { color: var(--ink); }
  .rmdone__grp { display: flex; flex-direction: column; gap: 6px; }
  .rmdone__grplab { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: var(--ink-soft); }
  .rmdone__parts { display: flex; flex-wrap: wrap; gap: 6px; }
  .rmdone__chip { font-family: var(--font-mono); font-size: 10px; font-weight: 700; border: 1.5px solid var(--ink); background: var(--paper); padding: 4px 8px; }
  .rmdone__chip.is-go { border-style: dashed; border-color: var(--line); color: var(--ink-soft); }
  .rmdone__foot { padding: 14px 20px; border-top: 2px solid var(--ink); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .rmdone__undo { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 1px; background: var(--ok); color: #fff; border: none; padding: 9px 16px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
  .rmdone__link { font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 1px; color: var(--ink); text-decoration: none; border: 1.5px solid var(--ink); padding: 8px 14px; background: var(--paper); }
  .rmdone__link--end { margin-left: auto; }

  @media (max-width: 880px) {
    .idp-body { grid-template-columns: 1fr; }
    .idp-map { position: static; border-right: none; border-bottom: 2px solid var(--ink); max-width: 420px; }
  }
</style>
