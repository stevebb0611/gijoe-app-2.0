<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>G.I. Joe Collection — Figures (v3 · chips + sort + saved views)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="add-figure.css" />
<style>
  :root {
    --paper: #f3eee2;
    --ink: #211f1a;
    --ink-soft: #56503f;
    --line: rgba(33,31,26,.55);
    --line-soft: rgba(33,31,26,.22);
    --accent: #b8402f;
    --ok: #5d7d4d;
    --olive: #5f6b39;
    --crimson: #a23a2c;
    --oktober: oklch(0.5 0.085 245);
    --dreadnok: oklch(0.55 0.108 58);
    --ring-track: rgba(33,31,26,.16);
    --card: #e9e2d2;
    --font-display: 'Oswald', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --shadow: 3px 3px 0 var(--ink);
    --rot: -.5deg;
    --chrome-h: 116px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); }
  body.no-wobble { --rot: 0deg; }

  /* ===== shared low-fi widgets ===== */
  .wf-fac { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 1px;
    padding: 2px 7px; border: 1.5px solid var(--ink); color: #fff; display: inline-block; text-align: center; min-width: 94px; line-height: 1.3; box-sizing: border-box; }
  .wf-fac--joe { background: var(--olive); }
  .wf-fac--cobra { background: var(--crimson); }
  .wf-fac--oktober { background: var(--oktober); }
  .wf-fac--dreadnok { background: var(--dreadnok); }
  body.no-faction .wf-fac--joe, body.no-faction .wf-fac--cobra, body.no-faction .wf-fac--oktober, body.no-faction .wf-fac--dreadnok { background: var(--ink-soft); }
  .wf-fac--mini { font-size: 9px; padding: 1px 5px; min-width: 84px; letter-spacing: .5px; }

  .wf-photo { background-color: var(--card);
    background-image: repeating-linear-gradient(45deg, transparent 0 7px, var(--line-soft) 7px 8px);
    border: 1.5px solid var(--ink); display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft); position: relative; }
  .wf-photo__tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; background: var(--paper);
    padding: 2px 5px; border: 1px solid var(--line-soft); }

  .wf-bar { background: var(--card); border: 1.5px solid var(--ink); width: 100%; overflow: hidden; }
  .wf-bar__fill { height: 100%; background: var(--accent);
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.25) 0 4px, transparent 4px 8px); }
  .wf-bar__fill.is-done { background: var(--ok); }

  .wf-ring { border-radius: 50%; display: grid; place-items: center; border: 1.5px solid var(--ink); flex: none; }
  .wf-ring__hole { background: var(--paper); border-radius: 50%; width: 68%; height: 68%; display: grid; place-items: center; }
  .wf-ring__pct { font-family: var(--font-display); font-weight: 700; font-size: 16px; line-height: 1; }
  .wf-ring__pct small { font-size: 8px; font-family: var(--font-mono); }

  /* ===== page shell ===== */
  .invp { color: var(--ink); font-family: var(--font-mono); font-size: 13px; min-height: 100vh; }
  .invp-chrome { position: sticky; top: 0; z-index: 40; }

  .invp-top { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 22px; padding: 12px 26px; background: var(--ink); color: var(--paper); }
  .inv-addfig { display: inline-flex; align-items: center; white-space: nowrap; text-decoration: none; flex: none;
    font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: .2px;
    color: #fff !important; background: var(--olive); border: 1.5px solid var(--olive); padding: 8px 14px;
    box-shadow: 2px 2px 0 rgba(0,0,0,.35); }
  .inv-addfig:hover { background: #717f3f; border-color: #717f3f; }
  .inv-addfig { cursor: pointer; }
  .inv-addfig__mk { font-size: 15px; margin-right: 4px; }
  .inv-brand { display: flex; align-items: center; gap: 14px; }
  .inv-brand__mk { display: inline-flex; align-items: center; }
  .inv-brand__name { font-family: var(--font-display); font-weight: 700; font-size: 19px; letter-spacing: .5px; line-height: 1; }
  .inv-brand__sub { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; opacity: .6; }
  .inv-nav { display: flex; gap: 10px; align-items: center; align-self: center; }
  .inv-nav a { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; color: rgba(255,255,255,.55); text-decoration: none; padding: 5px 12px; border: 1.5px solid transparent; white-space: nowrap; }
  .inv-nav a:hover { color: var(--paper); }
  .inv-nav a.is-active { color: #fff; border-color: rgba(255,255,255,.35); background: rgba(255,255,255,.08); }
  .inv-nav a em { font-style: normal; font-family: var(--font-mono); font-size: 10px; opacity: .7; margin-left: 4px; }
  .inv-nav__soon { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; color: rgba(255,255,255,.5); text-decoration: none; padding: 5px 12px; border: 1.5px dashed rgba(255,255,255,.32); background-image: repeating-linear-gradient(45deg, transparent 0 6px, rgba(255,255,255,.06) 6px 7px); cursor: pointer; white-space: nowrap; }
  .inv-nav__soon:hover { color: var(--paper); border-color: rgba(255,255,255,.5); }
  .inv-nav__tag { font-style: normal; font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .5px; color: rgba(255,255,255,.6); border: 1px solid rgba(255,255,255,.3); padding: 1px 5px; }
  .inv-search { background: rgba(255,255,255,.1); border: 1.5px solid rgba(255,255,255,.3); padding: 7px 12px; display: flex; gap: 8px; align-items: center; color: rgba(255,255,255,.55); font-family: var(--font-display); font-weight: 500; font-size: 13px; letter-spacing: .2px; }
  .invp-mid { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .invp-search { flex: 0 1 440px; max-width: 440px; }
  .invp-search input { flex: 1; background: transparent; border: none; outline: none; color: var(--paper); font: inherit; }
  .invp-search input::placeholder { color: rgba(255,255,255,.45); }
  .invp-search__x { background: transparent; border: none; color: rgba(255,255,255,.6); cursor: pointer; font-size: 12px; }
  .inv-kpis { display: flex; gap: 8px; }
  .invk { border: 1.5px solid rgba(255,255,255,.3); padding: 5px 12px; display: flex; flex-direction: column; align-items: center; text-align: center; min-width: 84px; }
  .invk__v { font-family: var(--font-display); font-weight: 700; font-size: 20px; line-height: 1; }
  .invk__v small { font-family: var(--font-mono); font-size: 11px; opacity: .55; font-weight: 400; }
  .invk__k { font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: .2px; opacity: .6; margin-top: 3px; }

  /* toolbar */
  .invp-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 9px 26px; background: var(--card); border-bottom: 2px solid var(--ink); }
  .invp-bar__chips { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .chipgroup { display: inline-flex; border: 1.5px solid var(--line); }
  .chipgroup .chip { border: none; }
  .chipgroup .chip + .chip { border-left: 1.5px solid var(--line); }
  .chip { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; color: var(--ink); background: var(--paper); border: 1.5px solid var(--line); padding: 5px 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .chip.is-on { border-color: var(--ink); color: #fff; background: var(--ink); }
  .chip__x { opacity: .7; font-size: 9px; }
  .invp-bar__count { font-family: var(--font-mono); font-size: 10px; letter-spacing: .5px; color: var(--ink-soft); }
  .invp-bar__spacer { flex: 1; }
  .txtbtn { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; color: var(--ink); background: transparent; border: 1.5px solid var(--ink); padding: 6px 12px; cursor: pointer; white-space: nowrap; }
  .txtbtn:hover { background: var(--paper); }
  .inv-seg { display: inline-flex; border: 1.5px solid var(--ink); }
  .inv-seg button { font: inherit; font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; padding: 5px 12px; background: var(--paper); color: var(--ink); border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
  .inv-seg button svg { display: block; }
  .inv-seg button.is-on { background: var(--ink); color: var(--paper); }
  .inv-seg button + button { border-left: 1.5px solid var(--ink); }

  /* more-filters toggle */
  .txtbtn--more { display: inline-flex; align-items: center; gap: 7px; }
  .txtbtn--more.is-on { background: var(--ink); color: var(--paper); }
  .txtbtn__n { font-family: var(--font-mono); font-weight: 700; font-size: 10px; line-height: 1; background: var(--accent); color: #fff; padding: 2px 5px; }
  .txtbtn__caret { font-size: 9px; }

  /* ===== expandable facet panel — compact multi-column grid ===== */
  .invp-facets { background: var(--paper); border-bottom: 2px solid var(--ink); padding: 13px 26px 15px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 14px 30px; align-items: start; }
  .facet { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
  .facet.is-off { opacity: .55; }
  .facet__lab { display: flex; align-items: baseline; gap: 7px; }
  .facet__lab b { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 1.5px; color: var(--ink); }
  .facet__lab small { font-family: var(--font-mono); font-size: 8px; letter-spacing: .5px; color: var(--ink-soft); }
  .facet__chips { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .facet__note { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: .5px; color: var(--ink-soft); border: 1px dashed var(--line); padding: 3px 7px; background: repeating-linear-gradient(45deg, transparent 0 5px, var(--line-soft) 5px 6px); }
  .chip[disabled] { cursor: default; }
  .chip--fac.is-on { color: #fff; border-color: var(--ink); }
  .chip--joe.is-on { background: var(--olive); border-color: var(--olive); }
  .chip--cobra.is-on { background: var(--crimson); border-color: var(--crimson); }
  .chip--oktober.is-on { background: var(--oktober); border-color: var(--oktober); }
  .chip--dreadnok.is-on { background: var(--dreadnok); border-color: var(--dreadnok); }
  body.no-faction .chip--fac.is-on { background: var(--ink); border-color: var(--ink); }
  /* compact year-range control */
  .facet__range { display: flex; align-items: center; gap: 8px; }
  .facet__range select { font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--ink); background: var(--paper); border: 1.5px solid var(--ink); padding: 4px 6px; cursor: pointer; }
  .facet__range span { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); }
  /* a faint vertical rule between the two grid halves reads as deliberate sectioning */
  .facet--span { grid-column: 1 / -1; display: flex; align-items: baseline; gap: 16px; padding-top: 11px; margin-top: 3px; border-top: 1.5px solid var(--line); }
  .facet--span .facet__lab { flex-direction: column; gap: 1px; flex: 0 0 auto; }
  .facet--span .facet__lab b { color: var(--ink-soft); }
  .facet__mock { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .facet__mocklab { font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .8px; color: var(--ink-soft); text-transform: uppercase; }
  .facet__mockdiv { width: 1px; align-self: stretch; background: var(--line); margin: 0 4px; }

  /* ===== active-filter summary line ===== */
  .invp-active { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 8px 26px; background: var(--card); border-bottom: 1.5px solid var(--ink); }
  .invp-active__lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); }
  .invtok { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: .2px; color: var(--ink); border: 1.5px solid var(--ink); background: var(--paper); padding: 3px 9px; cursor: pointer; }
  .invtok b { font-family: var(--font-mono); font-weight: 700; font-size: 8px; letter-spacing: .5px; color: var(--ink-soft); }
  .invtok__x { font-size: 9px; opacity: .65; }
  .invtok:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .invtok:hover b, .invtok:hover .invtok__x { color: rgba(255,255,255,.85); opacity: 1; }
  .invp-active__clear { margin-left: auto; font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: .2px; color: var(--accent); background: none; border: none; cursor: pointer; }
  .invp-active__clear:hover { text-decoration: underline; }

  /* sub-team tag on rows / cards */
  .idsub { font-style: normal; font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .3px; color: var(--ink-soft); background: var(--paper); border: 1px solid var(--line-soft); padding: 1px 5px; margin-left: 7px; vertical-align: 2px; }

  /* ===== year sections ===== */
  .invp-body { padding: 0 26px 90px; }
  .invp-empty { padding: 60px; text-align: center; color: var(--ink-soft); font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; }
  .ysec { border-bottom: 2px solid var(--ink); }
  .ysec__hd { position: sticky; top: var(--chrome-h); z-index: 20; width: 100%; text-align: left; font: inherit; color: inherit; cursor: pointer;
    display: grid; grid-template-columns: 92px 1fr 232px 50px 26px; gap: 18px; align-items: center; padding: 12px 12px; background: var(--paper); border-bottom: 1.5px dashed var(--line); }
  .ysec.is-open .ysec__hd { background: var(--ink); color: var(--paper); border-bottom-color: var(--ink); }
  .ysec__hd:hover { background: var(--card); }
  .ysec.is-open .ysec__hd:hover { background: #2c2922; }
  .ysec__yr { font-family: var(--font-display); font-weight: 700; font-size: 23px; line-height: 1; letter-spacing: .5px;
    background: var(--ink); color: var(--paper); padding: 8px 10px; justify-self: start; align-self: center; box-shadow: 2px 2px 0 var(--line); }
  .ysec.is-open .ysec__yr { background: var(--paper); color: var(--ink); box-shadow: 2px 2px 0 rgba(243,238,226,.35); }
  .ysec__title { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .ysec__lab { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: 1px; }
  .ysec__meta { font-size: 10px; letter-spacing: .5px; color: var(--ink-soft); }
  .ysec.is-open .ysec__meta { color: rgba(255,255,255,.7); }
  .ysec__bar { display: flex; align-items: center; flex: 1; min-width: 0; }
  .ysec__bar .wf-bar { height: 8px; }
  .ysec__meters { display: flex; flex-direction: column; gap: 5px; }
  .ysec__meter { display: grid; grid-template-columns: 62px 1fr 30px; gap: 8px; align-items: center; }
  .ysec__meterlab { font-family: var(--font-mono); font-size: 8px; letter-spacing: 1px; color: var(--ink-soft); }
  .ysec.is-open .ysec__meterlab { color: rgba(255,255,255,.65); }
  .ysec__metern { font-family: var(--font-mono); font-weight: 700; font-size: 10px; text-align: right; }
  .ysec__pct { font-family: var(--font-display); font-weight: 700; font-size: 16px; text-align: right; }
  .ysec__chev { font-size: 15px; text-align: center; }
  .ysec__body { padding: 12px 4px 18px; }

  /* ===== roster rows (list) ===== */
  .inv-cols, .inv-row { display: grid; grid-template-columns: 42px 1fr 88px 50px 1.5fr 92px 24px; gap: 12px; align-items: center; }
  .inv-cols { padding: 2px 12px 8px; font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); }
  .inv-row { width: 100%; text-align: left; font: inherit; color: inherit; cursor: pointer; background: var(--card); border: 1.5px solid var(--ink); padding: 8px 12px; margin-bottom: 6px; box-shadow: var(--shadow); }
  .inv-row:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .inv-row.is-active { outline: 3px solid var(--accent); outline-offset: -1px; }
  .inv-row.is-open { background: var(--paper); box-shadow: 4px 4px 0 var(--ink); outline: 2px solid var(--ink); outline-offset: -1px; margin-bottom: 0; }
  .inv-row.is-ghost { background: transparent; border-style: dashed; box-shadow: none; opacity: .72; }
  .inv-thumb { width: 42px; height: 42px; background-color: var(--card); background-image: repeating-linear-gradient(45deg, transparent 0 6px, var(--line-soft) 6px 7px); border: 1.5px solid var(--ink); display: grid; place-items: center; }
  .inv-row.is-ghost .inv-thumb { background: repeating-linear-gradient(45deg, transparent 0 6px, var(--line-soft) 6px 7px); }
  .inv-thumb[data-tag="—"]::after { content: "—"; color: var(--ink-soft); }
  .inv-name b { font-family: var(--font-display); font-weight: 700; font-size: 16px; display: flex; flex-wrap: wrap; align-items: center; row-gap: 4px; line-height: 1; }
  .inv-name { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; }
  .inv-name i { font-style: normal; font-size: 10px; color: var(--ink-soft); line-height: 1.2; }
  .idver { font-style: normal; font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .3px; color: var(--ink-soft); border: 1px solid var(--line-soft); padding: 0 4px; margin-left: 7px; vertical-align: 2px; }
  .idver--lg { font-size: 11px; padding: 1px 6px; margin-left: 9px; vertical-align: 3px; }
  /* variant indicator — bordered "layers + count" pill (sits apart from the version chip) */
  .idvar { font-style: normal; display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-weight: 700; font-size: 9px; color: var(--accent); border: 1px solid var(--accent); padding: 1px 6px; margin-left: 8px; vertical-align: 1px; --lyrbg: var(--card); }
  .lyr { width: 13px; height: 12px; position: relative; display: inline-block; flex: none; }
  .lyr b, .lyr::before, .lyr::after { content: ""; position: absolute; width: 8px; height: 8px; border: 1.4px solid currentColor; background: var(--lyrbg, transparent); box-sizing: border-box; }
  .lyr b { top: 0; left: 4px; }
  .lyr::before { top: 2px; left: 2px; }
  .lyr::after { top: 4px; left: 0; }
  .idfull { display: block; font-style: normal; font-family: var(--font-display); font-weight: 500; font-size: 11px; color: var(--ink-soft); line-height: 1.15; margin-top: 2px; }
  .idveh { display: inline-flex; align-items: center; gap: 6px; margin-top: 4px; font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .3px; color: var(--ink); background: var(--paper); border: 1.5px solid var(--ink); padding: 2px 7px; box-shadow: 1.5px 1.5px 0 var(--line-soft); }
  .idveh b { font-family: var(--font-display); font-weight: 700; font-size: 8px; letter-spacing: .6px; color: var(--ink-soft); }
  .idveh--modal { margin: 0; }
  .inv-owned { font-family: var(--font-display); font-weight: 700; font-size: 16px; }
  .inv-stock { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .inv-stock__n { font-size: 11px; font-weight: 700; white-space: nowrap; color: var(--ink); flex: none; }
  .inv-stock__done { font-size: 10px; font-weight: 700; letter-spacing: .5px; color: var(--ok); white-space: nowrap; }
  .inv-stock__miss { font-size: 10px; color: var(--ink-soft); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .inv-stock__multi { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: .3px; color: var(--ink-soft); }
  .inv-ghosttag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); border: 1px dashed var(--line); padding: 3px 7px; }
  .inv-bar { width: 78px; flex: none; height: 12px; background: var(--paper); border: 1.5px solid var(--ink); overflow: hidden; }
  .inv-bar__fill { height: 100%; background: var(--ink-soft); background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.18) 0 4px, transparent 4px 8px); }
  .inv-bar__fill.is-done { background: var(--ok); }
  .inv-need { font-family: var(--font-mono); font-weight: 700; font-size: 11px; text-align: center; border: 1.5px solid var(--ink); padding: 4px 6px; background: var(--paper); }
  .inv-need.is-zero { background: var(--ok); color: #fff; }
  .inv-need.is-ghost { background: var(--paper); color: var(--accent); border-color: var(--accent); border-style: dashed; }
  .inv-go { font-size: 15px; color: var(--ink-soft); text-align: center; }

  /* instance accordion */
  .inv-insts { margin: 0 0 6px 20px; padding: 7px 0 2px 16px; border-left: 2px dashed var(--ink); display: flex; flex-direction: column; gap: 5px; }
  .inv-inst { display: grid; grid-template-columns: 16px 1fr 1.5fr 92px 24px; gap: 12px; align-items: center; width: 100%; text-align: left; font: inherit; color: inherit; cursor: pointer; background: var(--card); border: 1.5px solid var(--line); padding: 7px 12px; }
  .inv-inst:hover { border-color: var(--ink); transform: translateX(1px); }
  .inv-inst.is-active { outline: 2.5px solid var(--accent); outline-offset: -1px; }
  .inv-inst__tab { font-size: 14px; color: var(--ink-soft); }

  .card__multi { font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--ink-soft); border: 1.5px solid var(--ink); padding: 5px 9px; background: var(--paper); }

  /* ===== ported: damage map / condition (shared with Instance Detail) ===== */

  .dm { display: flex; flex-direction: column; gap: 10px; }

  .dm-stage { position: relative; width: auto; height: min(62vh, 540px); aspect-ratio: 200 / 440; margin: 0 auto; background: var(--card); border: 2px solid var(--ink); box-shadow: var(--shadow);
    background-image: repeating-linear-gradient(45deg, transparent 0 9px, var(--line-soft) 9px 10px); }
  .dm-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .dm-svg .dm-fill { fill: var(--paper); }
  .dm-svg .dm-limb { fill: none; }
  .dm-backtag { position: absolute; top: 8px; right: 10px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--ink-soft); border: 1px solid var(--line-soft); padding: 2px 6px; background: var(--paper); }
  .dm-region { position: absolute; transform: translate(-50%,-50%); border: 1.2px dashed transparent; background: var(--pc); cursor: pointer; padding: 0; transition: background .12s, border-color .12s; opacity: .55; }
  .dm-region:hover { border-color: var(--line); }
  .dm-region.is-painted { opacity: .4; }
  .dm-region__sev { position: absolute; right: -7px; bottom: -7px; width: 15px; height: 15px; border-radius: 50%; color: #fff; font-family: var(--font-mono); font-weight: 700; font-size: 9px; display: grid; place-items: center; border: 1.5px solid var(--ink); }
  .dm-node { position: absolute; transform: translate(-50%,-50%); width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--ink); background: var(--nc); cursor: pointer; font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: #fff; display: grid; place-items: center; padding: 0; box-shadow: 1px 1px 0 var(--ink); z-index: 2; transition: transform .1s; }
  .dm-node:hover { transform: translate(-50%,-50%) scale(1.18); }

  .dm-node.is-sel { outline: 3px solid var(--accent); outline-offset: 2px; }
  .dm-legend { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 9px; color: var(--ink-soft); }
  .dm-legend__lab { font-weight: 700; letter-spacing: 1px; }
  .dm-legend__i { display: inline-flex; align-items: center; gap: 5px; }
  .dm-legend__i i { width: 11px; height: 11px; border: 1.5px solid var(--ink); display: inline-block; }
  .dm-legend__hint { margin-left: auto; font-size: 8px; letter-spacing: .5px; }

  .panel { border: 1.5px solid var(--ink); background: var(--card); box-shadow: var(--shadow); }
  .panel__hd { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 1px; padding: 9px 12px; background: var(--ink); color: var(--paper); }
  .panel__hd em { font-style: normal; font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; opacity: .65; font-weight: 400; }
  .panel__x { margin-left: auto; background: transparent; border: none; color: var(--paper); cursor: pointer; font-size: 12px; }
  .panel__note { font-size: 10px; color: var(--ink-soft); line-height: 1.5; padding: 8px 12px 12px; }
  .grades { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .grade { border: 1.5px solid var(--ink); background: var(--paper); padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .grade__kind { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--ink-soft); }
  .grade__val { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: .5px; color: #fff; padding: 4px 12px; align-self: flex-start; width: fit-content; line-height: 1.15; }
  .grade__score { font-family: var(--font-mono); font-size: 9px; color: var(--ink-soft); letter-spacing: .3px; }
  .panel--log { outline: 2px solid var(--accent); outline-offset: -1px; }
  .logger { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }

  .logger__type { font-size: 12px; }
  .logger__sevs { display: flex; gap: 5px; }
  .logger__sev { width: 26px; height: 24px; border: 1.5px solid var(--ink); background: var(--paper); cursor: pointer; font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--ink); }
  .logger__sev:hover { background: var(--sc); color: #fff; }
  .logger__existing { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 12px; }
  .tagmark { display: inline-flex; align-items: center; gap: 6px; border: 1.5px solid var(--ink); background: var(--paper); font-size: 10px; padding: 3px 6px; }
  .tagmark i { width: 9px; height: 9px; }
  .tagmark button { background: transparent; border: none; cursor: pointer; color: var(--ink-soft); font-size: 10px; }
  .id-sealed { display: flex; flex-direction: column; gap: 14px; align-items: center; justify-content: center; text-align: center; padding: 20px 14px; height: 100%; }
  .id-sealed__card { width: 168px; aspect-ratio: 3 / 4; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px; padding: 0 14px; border: 2.5px solid var(--ink); background: repeating-linear-gradient(135deg, var(--paper) 0 10px, var(--line-soft) 10px 11px); box-shadow: var(--shadow); }
  .id-sealed__tag { font-family: var(--font-display); font-weight: 700; font-size: 15px; letter-spacing: .8px; line-height: 1.15; }
  .id-sealed__sub { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: var(--ink-soft); }
  .id-sealed p { font-size: 12px; line-height: 1.55; color: var(--ink-soft); max-width: 280px; margin: 0; }
  .id-mocgrade { display: flex; align-items: center; gap: 12px; padding: 12px; }
  .id-mocgrade__badge { flex: none; font-family: var(--font-display); font-weight: 700; font-size: 15px; letter-spacing: 1px; color: #fff; background: var(--ok); border: 1.5px solid var(--ink); padding: 9px 12px; }
  .id-mocgrade__txt { display: flex; flex-direction: column; gap: 2px; }
  .id-mocgrade__txt b { font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: .3px; }
  .id-mocgrade__txt i { font-style: normal; font-size: 11px; color: var(--ink-soft); line-height: 1.4; }

  /* ===== flip card + binder tabs ===== */
  .inv-cardwrap { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 720px; max-width: calc(100vw - 40px); height: min(92vh, 620px); z-index: 51; perspective: 2600px; }
  .inv-flip { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform .55s cubic-bezier(.45,.05,.2,1); }
  .inv-cardwrap.is-flipped .inv-flip { transform: rotateY(180deg); }
  .inv-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; background: var(--paper); border: 2.5px solid var(--ink); box-shadow: 8px 8px 0 rgba(33,31,26,.5); overflow: hidden; }
  .inv-face--front { display: flex; flex-direction: column; }
  .inv-front-body { flex: 1; min-height: 0; display: grid; grid-template-columns: 230px 1fr; }
  .inv-front-body > * { min-height: 0; }
  .inv-front-body .inv-modal__r { overflow-y: auto; }
  .inv-face--back { transform: rotateY(180deg); }

  .inv-tabs-rail { position: absolute; top: 34px; left: 0; transform: translateX(-100%); display: flex; flex-direction: column; gap: 9px; align-items: flex-end; z-index: 4; transition: transform .66s cubic-bezier(.34,1.5,.56,1), opacity .38s ease; }
  /* while the card flips, retract the binder tabs under the card edge … */
  .inv-tabs-rail.is-tucked { transform: translateX(0); opacity: 0; pointer-events: none; transition: transform .17s cubic-bezier(.4,0,1,1), opacity .14s ease; }
  @media (prefers-reduced-motion: reduce) { .inv-tabs-rail, .inv-tabs-rail.is-tucked { transition: none; } }
  .inv-tab { font-family: var(--font-display); font-weight: 700; font-size: 13.5px; letter-spacing: .5px; line-height: 1; padding: 11px 15px; min-width: 68px; text-align: left; color: var(--ink-soft); background: var(--card); border: 2px solid var(--ink); border-right: none; box-shadow: -3px 3px 0 rgba(33,31,26,.22); cursor: pointer; transform: translateX(10px); transition: transform .14s, background .14s, color .14s; }
  .inv-tab:hover { transform: translateX(4px); }
  .inv-tab.is-active { background: var(--ink); color: var(--paper); transform: translateX(3px); box-shadow: -3px 3px 0 rgba(33,31,26,.4); }
  .inv-tab--add { min-width: 0; text-align: center; font-size: 15px; color: var(--ink); padding: 8px 12px; }

  .inv-cardback { display: flex; flex-direction: column; }
  /* shared persistent header (both faces) */
  .inv-cardhd { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 11px 46px 11px 16px; background: var(--ink); color: var(--paper); flex: none; }
  .inv-cardhd__id { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: .5px; display: flex; align-items: baseline; gap: 10px; }
  .inv-cardhd__id b { font-weight: 700; white-space: nowrap; }
  .inv-cardhd__no { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; opacity: .6; flex: none; }
  .inv-cardhd__seg { display: inline-flex; border: 1.5px solid rgba(255,255,255,.4); flex: none; }
  .inv-cardhd__seg button { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 1px; padding: 6px 14px; background: transparent; color: rgba(255,255,255,.62); border: none; cursor: pointer; transition: background .12s, color .12s; }
  .inv-cardhd__seg button + button { border-left: 1.5px solid rgba(255,255,255,.4); }
  .inv-cardhd__seg button.is-on { background: var(--accent); color: #fff; }
  /* MOC flag — sits left of the FIGURE|CONDITION toggle in the shared header */
  .inv-cardhd__ctrls { display: flex; align-items: center; gap: 12px; flex: none; }
  .inv-cardhd__moc { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; }
  .inv-cardhd__moc input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
  .inv-cardhd__mocbox { flex: none; width: 17px; height: 17px; border: 1.5px solid rgba(255,255,255,.55); display: grid; place-items: center; font-size: 11px; font-weight: 700; color: #fff; background: transparent; }
  .inv-cardhd__moc.is-on .inv-cardhd__mocbox { background: var(--ok); border-color: var(--ok); }
  .inv-cardhd__moclab { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,.7); }
  .inv-cardhd__moc.is-on .inv-cardhd__moclab { color: #fff; }
  .inv-cardback__hd { display: flex; align-items: center; gap: 14px; padding: 10px 14px; background: var(--ink); color: var(--paper); }
  .inv-flipback { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: .5px; color: var(--paper); background: transparent; border: 1.5px solid rgba(255,255,255,.35); padding: 6px 11px; cursor: pointer; }
  .inv-flipback:hover { background: rgba(255,255,255,.1); }
  .inv-cardback__title { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: .5px; display: flex; align-items: baseline; gap: 10px; }
  .inv-cardback__title em { font-style: normal; font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; opacity: .6; }
  .inv-cardback__body { flex: 1; min-height: 0; display: grid; grid-template-columns: 296px 1fr; }
  .inv-cardback__map { padding: 16px 14px; border-right: 2px solid var(--ink); display: flex; min-height: 0; overflow: hidden; }
  .inv-cardback__map .dm { width: 100%; height: 100%; }
  .inv-cardback__map .dm-stage { height: auto; flex: 1 1 auto; min-height: 0; }
  .inv-cardback__side { padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; min-height: 0; }

  /* ===== modal ===== */
  .inv-scrim { position: fixed; inset: 0; background: rgba(33,31,26,.55); z-index: 50; }
  .inv-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 720px; max-width: calc(100vw - 40px); background: var(--paper); border: 2.5px solid var(--ink); box-shadow: 8px 8px 0 rgba(33,31,26,.5); display: grid; grid-template-columns: 230px 1fr; z-index: 51; }
  .inv-modal__x { position: absolute; top: 0; right: 0; background: var(--ink); color: var(--paper); border: none; border-left: 2.5px solid var(--ink); border-bottom: 2.5px solid var(--ink); width: 32px; height: 32px; cursor: pointer; font-size: 13px; line-height: 1; display: grid; place-items: center; z-index: 6; transition: background .15s ease; }
  .inv-modal__x:hover { background: var(--accent); }

  .inv-modal__photo { width: 100%; height: 165px; }

  .inv-modal__id { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .inv-modal__full { font-family: var(--font-display); font-weight: 500; font-size: 12px; color: var(--ink-soft); text-align: center; }
  .inv-modal__var { font-size: 10px; color: var(--ink-soft); letter-spacing: 1px; text-align: center; }
  .inv-modal__variants { display: flex; justify-content: center; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 9px; letter-spacing: .5px; color: var(--accent); text-align: center; --lyrbg: var(--paper); }
  .acc--note { display: block; padding: 11px 12px; font-size: 11px; font-style: italic; color: var(--ink-soft); }
  .inv-modal__notin { font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: 1px; text-align: center; color: var(--ink-soft); border: 1.5px dashed var(--line); padding: 8px 14px; line-height: 1.2; }
  .inv-modal__r { padding: 18px 20px; }

  .inv-modal__tabs span { font-family: var(--font-display); font-weight: 600; font-size: 12.5px; letter-spacing: .3px; padding: 6px 12px; color: var(--ink-soft); cursor: pointer; white-space: nowrap; }
  .inv-modal__tabs span.is-active { background: var(--ink); color: var(--paper); font-weight: 700; }
  .inv-modal__tabadd { border: 1.5px dashed var(--line-soft); color: var(--ink-soft); }
  .inv-modal__row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; gap: 10px; }
  .inv-modal__sec { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; color: var(--ink-soft); }
  .inv-modal__note { font-size: 11px; font-style: italic; color: var(--ink-soft); }
  .inv-modal__blurb { font-size: 12px; line-height: 1.5; color: var(--ink-soft); margin: 8px 0 14px; }
  .inv-bprint { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; color: var(--ink-soft); margin-bottom: 8px; }
  .inv-accgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .invchip { display: flex; align-items: center; gap: 8px; border: 1.5px solid var(--ink); padding: 7px 10px; background: var(--card); }
  .invchip__ic { width: 18px; height: 18px; border: 1.5px solid var(--ink); display: grid; place-items: center; font-weight: 700; font-size: 12px; flex: none; background: var(--paper); }
  .invchip.is-have { background: var(--paper); }
  .invchip.is-have .invchip__ic { background: var(--ok); color: #fff; }
  .invchip.is-miss .invchip__ic { color: var(--accent); }
  .invchip__n { flex: 1; font-size: 12px; min-width: 0; }
  .invchip__q { font-family: var(--font-mono); font-weight: 700; font-size: 11px; }

  /* ===== accessory checklist — one box per required unit ===== */
  .acc-list { border: 1.5px solid var(--ink); background: var(--paper); margin-bottom: 16px; }
  .acc-list__cap { display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ink-soft);
    padding: 7px 12px; border-bottom: 1.5px solid var(--ink); background: var(--card); }
  .acc-list__cap b { color: var(--ink); font-weight: 700; }
  .acc { display: grid; grid-template-columns: 1fr auto auto; column-gap: 14px; align-items: center; padding: 9px 12px; }
  .acc + .acc { border-top: 1px solid var(--line-soft); }
  .acc.is-stack { align-items: center; }
  .acc__name { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; line-height: 1.15; }
  .acc__boxes { display: grid; gap: 5px; justify-content: end; }
  .acc__box { width: 22px; height: 22px; border: 1.5px solid var(--ink); background: var(--paper);
    display: grid; place-items: center; padding: 0; cursor: pointer; line-height: 1;
    font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: transparent; }

  /* editable checklist: pull-from-bin chip sits under the accessory name (modal) */
  .acc__name { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .acc__pullbin { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: .3px;
    color: var(--accent); background: var(--paper); border: 1.5px dashed var(--accent); padding: 2px 6px;
    cursor: pointer; line-height: 1.2; }
  .acc__pullbin:hover { background: var(--accent); color: #fff; }

  /* file-card box in the detail modal — mirrors the accessory checklist frame */
  .fc-row { grid-template-columns: 1fr auto auto; }
  .fc-row .acc__name { white-space: nowrap; }
  .fc-hint { font-family: var(--font-mono); font-size: 10px; letter-spacing: .5px; color: var(--ink-soft); align-self: center; text-align: right; line-height: 1.4; }

  .fc-caret { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 10px; color: var(--ink-soft); }
  .fc-box { color: transparent; }
  .fc-tellrow { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 9px 12px; border-top: 1px solid var(--line-soft); font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); line-height: 1.4; }
  .fc-cat { color: var(--accent); white-space: nowrap; }
  .inv-modal__btns { display: flex; gap: 8px; flex-wrap: wrap; }
  /* right column is a flex stack so the remove control can pin to the bottom-right */
  .inv-front-body .inv-modal__r { display: flex; flex-direction: column; }
  /* edit-notes textbox — full width to match the accessory & file-card boxes */
  .inv-notes { border: 1.5px solid var(--ink); background: var(--paper); margin-bottom: 14px; }
  .inv-notes__cap { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ink-soft);
    padding: 7px 12px; border-bottom: 1.5px solid var(--ink); background: var(--card); }
  .inv-notes__in { display: block; width: 100%; box-sizing: border-box; border: none; background: var(--paper);
    font-family: var(--font-mono); font-size: 11px; line-height: 1.5; color: var(--ink);
    padding: 9px 12px; min-height: calc(1.5em * 2 + 18px); resize: vertical; }
  .inv-notes__in:focus { outline: none; background: #fffefb; }
  .inv-notes__in::placeholder { color: var(--line); }
  /* notes: click the text to edit in place, autosaves on blur */
  .inv-notes__txt { display: block; width: 100%; box-sizing: border-box; background: var(--paper); border: none;
    text-align: left; font-family: var(--font-mono); font-size: 11px; line-height: 1.5; color: var(--ink);
    padding: 9px 12px; min-height: calc(1.5em * 2 + 18px); cursor: text; white-space: pre-wrap; }
  .inv-notes__txt:hover { background: #fffefb; }
  .inv-notes__txt.is-empty { color: var(--line); font-style: italic; }
  /* this-copy metadata group: bin/box location grouped above notes */
  .inv-copymeta { border: 1.5px solid var(--ink); background: var(--card); margin-bottom: 14px; }
  .inv-copymeta__cap { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; color: var(--ink-soft);
    padding: 7px 12px; border-bottom: 1.5px solid var(--ink); background: var(--ink); color: var(--paper); }
  .inv-copymeta .inv-notes { border: none; border-bottom: 1.5px solid var(--ink); margin: 0; }
  .inv-copymeta .inv-notes:last-child { border-bottom: none; }
  .inv-loc__in, .inv-loc__txt { min-height: 0; }
  /* country-of-origin row inside the this-copy group (reuses .af-coo__* from add-figure.css) */
  .inv-coo__opts { display: flex; flex-wrap: wrap; gap: 9px 18px; padding: 10px 12px; }
  .inv-coo__hint { font-weight: 400; opacity: .75; }
  /* remove = trash icon, far right, pinned to the bottom of the stack */
  .inv-modal__btns--foot { margin-top: auto; padding-top: 4px; justify-content: flex-end; }
  .invbtn-trash { display: inline-grid; place-items: center; width: 34px; height: 34px; padding: 0;
    background: transparent; color: var(--ink-soft); border: 1.5px solid var(--line); cursor: pointer; }
  .invbtn-trash:hover { color: #fff; background: var(--danger, #8f2f24); border-color: var(--danger, #8f2f24); }
  .invbtn { font-family: var(--font-display); font-weight: 600; letter-spacing: 1px; font-size: 12px; padding: 9px 14px; background: var(--ink); color: var(--paper); border: none; cursor: pointer; }
  .invbtn--ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
  .invbtn--go { background: var(--accent); color: #fff; }
  .inv-opendetail { display: inline-flex; align-items: center; gap: 7px; text-decoration: none; margin-right: auto; white-space: nowrap; }
  .inv-opendetail__chev { font-weight: 700; }
  .invbtn--rebal { background: var(--accent); color: #fff; align-self: flex-start; margin-top: 8px; font-size: 11px; padding: 7px 12px; }

  .inv-moc { display: flex; align-items: flex-start; gap: 9px; padding: 9px 11px; margin-bottom: 10px; border: 1.5px solid var(--line); background: var(--paper); cursor: pointer; }
  .inv-moc.is-on { border-color: var(--ink); background: var(--card); }
  .inv-moc input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
  .inv-moc__box { flex: none; width: 18px; height: 18px; border: 1.5px solid var(--ink); display: grid; place-items: center; font-size: 12px; font-weight: 700; background: var(--paper); margin-top: 1px; }
  .inv-moc.is-on .inv-moc__box { background: var(--ok); color: #fff; border-color: var(--ok); }
  .inv-moc__txt { display: flex; flex-direction: column; gap: 3px; }
  .inv-moc__txt b { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: .5px; display: flex; align-items: center; gap: 7px; white-space: nowrap; }
  .inv-moc__txt em { font-family: var(--font-mono); font-weight: 700; font-size: 8px; letter-spacing: 1px; background: var(--ink); color: var(--paper); padding: 1px 4px; font-style: normal; }
  .inv-moc__txt i { font-family: var(--font-mono); font-size: 9.5px; font-style: normal; color: var(--ink-soft); line-height: 1.4; }

  /* ===== rebalance recommender ===== */
  .invk--rebal { border-color: var(--accent); background: rgba(184,64,47,.18); }
  .invk--rebal .invk__k { opacity: .85; }
  .inv-rebal { display: inline-block; font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .5px;
    color: #fff; background: var(--accent); padding: 2px 6px; margin-left: 8px; vertical-align: middle; }
  .inv-need.is-rebal { background: var(--accent); color: #fff; border-color: var(--accent); }
  .inv-rebalbox { background: var(--paper); border: 1.5px dashed var(--accent); padding: 9px 11px; margin-bottom: 7px;
    display: flex; flex-direction: column; gap: 4px; }
  .inv-rebalbox--modal { margin: 0 0 14px; }
  .inv-rebalbox__hd { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: .5px; color: var(--accent); }
  .inv-move { font-family: var(--font-mono); font-size: 11px; color: var(--ink); padding-left: 14px; position: relative; }
  .inv-move::before { content: "↳"; position: absolute; left: 0; color: var(--ink-soft); }
  .inv-move b { font-weight: 700; }

  .inv-modal__ringlab { font-family: var(--font-mono); font-size: 8px; letter-spacing: 1px; color: var(--ink-soft); text-align: center; }
  .invchip.is-partial { background: var(--paper); }
  .invchip.is-partial .invchip__ic { background: var(--accent); color: #fff; }
  .card__rebal { font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .5px; color: #fff; background: var(--accent); padding: 2px 6px; align-self: flex-start; }
  .card__multi.is-whole { background: var(--ok); color: #fff; border-color: var(--ok); }

  /* ════════ #7 (v3) — sort control ════════ */
  .sortwrap { position: relative; display: inline-flex; align-items: stretch; }
  .txtbtn--sort { display: inline-flex; align-items: center; gap: 6px; border-right-width: 0; }
  .dirbtn { font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--ink); background: var(--paper); border: 1.5px solid var(--ink); padding: 6px 9px; cursor: pointer; display: inline-flex; align-items: center; }
  .dirbtn:hover { background: var(--card); }
  .sortmenu__scrim { position: fixed; inset: 0; z-index: 44; }
  .sortmenu { position: absolute; top: calc(100% + 5px); left: 0; z-index: 45; min-width: 216px; background: var(--paper); border: 2px solid var(--ink); box-shadow: 5px 5px 0 rgba(33,31,26,.4); padding: 5px; }
  .sortmenu__cap { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 1px; color: var(--ink-soft); padding: 6px 8px 7px; border-bottom: 1.5px solid var(--line-soft); margin-bottom: 4px; }
  .sortmenu__item { display: flex; align-items: center; gap: 6px; width: 100%; text-align: left; font: inherit; font-family: var(--font-display); font-weight: 600; font-size: 13.5px; color: var(--ink); background: transparent; border: none; padding: 8px 9px; cursor: pointer; }
  .sortmenu__item:hover { background: var(--card); }
  .sortmenu__item.is-on { background: var(--ink); color: #fff; }
  .sortmenu__check { width: 12px; font-size: 11px; color: var(--accent); flex: none; }
  .sortmenu__item.is-on .sortmenu__check { color: #fff; }

  /* ════════ #7 (v3) — saved-views strip ════════ */
  .invp-views { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 7px 26px; background: var(--paper); border-bottom: 1.5px solid var(--ink); }
  .invp-views__lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); flex: none; }
  .invp-views__row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; min-height: 28px; }
  .invp-views__empty { font-family: var(--font-mono); font-size: 10px; letter-spacing: .3px; color: var(--ink-soft); font-style: italic; }
  .viewpill { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; color: var(--ink); background: var(--card); border: 1.5px solid var(--line); display: inline-flex; align-items: center; }
  .viewpill--saved.is-on { background: var(--ink); border-color: var(--ink); }
  .viewpill__main { display: inline-flex; align-items: center; gap: 6px; font: inherit; font-family: var(--font-display); font-weight: 600; background: none; border: none; color: inherit; padding: 5px 7px 5px 11px; cursor: pointer; }
  .viewpill__bm { color: var(--ink-soft); font-size: 10px; }
  .viewpill--saved.is-on .viewpill__main { color: #fff; }
  .viewpill--saved.is-on .viewpill__bm { color: #fff; }
  .viewpill__del { background: none; border: none; border-left: 1.5px solid var(--line); color: var(--ink-soft); cursor: pointer; font-size: 10px; padding: 6px 8px; }
  .viewpill__del:hover { background: var(--accent); color: #fff; }
  .viewpill--saved.is-on .viewpill__del { border-left-color: rgba(255,255,255,.3); color: rgba(255,255,255,.7); }
  .invp-views__save { margin-left: auto; flex: none; }
  .txtbtn--save { border-style: dashed; font-size: 12px; padding: 5px 11px; }
  .saveform { display: inline-flex; align-items: stretch; border: 1.5px solid var(--ink); background: var(--paper); box-shadow: 2px 2px 0 var(--line-soft); }
  .saveform input { border: none; outline: none; background: transparent; font: inherit; font-family: var(--font-mono); font-size: 12px; padding: 6px 10px; width: 168px; color: var(--ink); }
  .saveform input::placeholder { color: var(--line); }
  .saveform__ok { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: .5px; background: var(--olive); color: #fff; border: none; border-left: 1.5px solid var(--ink); padding: 6px 13px; cursor: pointer; }
  .saveform__ok:hover { background: #717f3f; }
  .saveform__x { background: transparent; border: none; border-left: 1.5px solid var(--line); color: var(--ink-soft); cursor: pointer; padding: 6px 9px; font-size: 11px; }

  @media (max-width: 900px) {
    .invp-top { grid-template-columns: 1fr; gap: 10px; }
    .inv-kpis { flex-wrap: wrap; }
    .inv-galgrid { grid-template-columns: repeat(2, 1fr); }
    .ysec__hd { grid-template-columns: 64px 1fr 50px 26px; }
    .ysec__meters { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#f3eee2"/>
    <rect x="26" y="30" width="48" height="40" fill="#211f1a"/>
    <rect x="32" y="38" width="36" height="5" fill="#b8402f"/>
    <rect x="32" y="48" width="28" height="4" fill="#e9e2d2"/>
    <rect x="32" y="56" width="32" height="4" fill="#e9e2d2"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="add-figure-catalog.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wf-data.jsx"></script>
<script src="assets/figure-masks.js"></script>
<script src="assets/figure-zones.js"></script>
<script type="text/babel" src="damage-map.jsx"></script>
<script type="text/babel" src="add-figure.jsx"></script>
<script type="text/babel" src="inventory-app.jsx"></script>

<script type="text/babel">
  const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle, TweakColor } = window;
  const { InventoryApp } = window;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "paper": "white",
    "accent": "#6b6f39",
    "wobble": false,
    "factionColors": true
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    React.useEffect(() => {
      const r = document.documentElement;
      r.style.setProperty('--paper', t.paper === 'white' ? '#f3eee2' : '#c9bca0');
      r.style.setProperty('--card', t.paper === 'white' ? '#e9e2d2' : '#dccfb2');
      r.style.setProperty('--accent', t.accent);
      document.body.classList.toggle('no-wobble', !t.wobble);
      document.body.classList.toggle('no-faction', !t.factionColors);
    }, [t]);

    return (
      <React.Fragment>
        <InventoryApp />
        <TweaksPanel>
          <TweakSection label="Paper & ink" />
          <TweakRadio label="Paper" value={t.paper} options={['kraft', 'white']} onChange={(v) => setTweak('paper', v)} />
          <TweakColor label="Accent" value={t.accent} options={['#b8402f', '#6b6f39', '#c9772f', '#3f6f86']} onChange={(v) => setTweak('accent', v)} />
          <TweakSection label="Feel" />
          <TweakToggle label="Hand-drawn wobble" value={t.wobble} onChange={(v) => setTweak('wobble', v)} />
          <TweakToggle label="Faction colors" value={t.factionColors} onChange={(v) => setTweak('factionColors', v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
