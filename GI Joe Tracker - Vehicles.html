<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>G.I. Joe Collection — Vehicles</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="chrome.css" />
<style>
  :root { --accent: #6b6f39; --ring-track: rgba(33,31,26,.16); --chrome-h: 116px; }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); }

  /* ===== shared low-fi widgets (same vocabulary as Figures) ===== */
  .wf-fac { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 1px;
    padding: 2px 7px; border: 1.5px solid var(--ink); color: #fff; display: inline-block; text-align: center; min-width: 94px; line-height: 1.3; box-sizing: border-box; }
  .wf-fac--joe { background: var(--olive); }
  .wf-fac--cobra { background: var(--crimson); }
  .wf-fac--mini { font-size: 9px; padding: 1px 5px; min-width: 84px; letter-spacing: .5px; }
  .wf-photo { background-color: var(--card);
    background-image: repeating-linear-gradient(45deg, transparent 0 7px, var(--line-soft) 7px 8px);
    border: 1.5px solid var(--ink); display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft); position: relative; }
  .wf-photo__tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; background: var(--paper);
    padding: 2px 5px; border: 1px solid var(--line-soft); }
  .wf-bar { background: var(--card); border: 1.5px solid var(--ink); width: 100%; overflow: hidden; }
  .wf-bar__fill { height: 100%; background: var(--accent);
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.25) 0 4px, transparent 4px 8px); }
  .wf-bar__fill.is-done { background: var(--ok); }

  /* ===== page shell + body ===== */
  .invp { color: var(--ink); font-family: var(--font-mono); font-size: 13px; min-height: 100vh; }

  /* toolbar (shared look with Figures; chip/seg live here, not chrome.css, to avoid clashes) */
  .invp-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 9px 26px; background: var(--card); border-bottom: 2px solid var(--ink); }
  .chipgroup { display: inline-flex; border: 1.5px solid var(--line); }
  .chipgroup .chip { border: none; }
  .chipgroup .chip + .chip { border-left: 1.5px solid var(--line); }
  .chip { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; color: var(--ink); background: var(--paper); border: 1.5px solid var(--line); padding: 5px 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .chip.is-on { border-color: var(--ink); color: #fff; background: var(--ink); }
  .chip__x { opacity: .7; font-size: 9px; }
  .invp-bar__spacer { flex: 1; }
  .invp-bar__lab { font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); }
  .txtbtn { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; color: var(--ink); background: transparent; border: 1.5px solid var(--ink); padding: 6px 12px; cursor: pointer; white-space: nowrap; }
  .txtbtn:hover { background: var(--paper); }
  .inv-seg { display: inline-flex; border: 1.5px solid var(--ink); }
  .inv-seg button { font: inherit; font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .2px; padding: 5px 12px; background: var(--paper); color: var(--ink); border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
  .inv-seg button svg { display: block; }
  .inv-seg button.is-on { background: var(--ink); color: var(--paper); }
  .inv-seg button + button { border-left: 1.5px solid var(--ink); }

  /* active/summary line */
  .invp-active { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 8px 26px; background: var(--card); border-bottom: 1.5px solid var(--ink); }
  .invp-active__lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); }
  .vveh-count { font-family: var(--font-mono); font-size: 11px; color: var(--ink); }
  .invp-active__clear { margin-left: auto; font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: .2px; color: var(--accent); background: none; border: none; cursor: pointer; }
  .invp-active__clear:hover { text-decoration: underline; }

  /* ===== year sections ===== */
  .invp-body { padding: 0 26px 90px; }
  .invp-empty { padding: 60px; text-align: center; color: var(--ink-soft); font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; }
  .ysec { border-bottom: 2px solid var(--ink); }
  .ysec__hd { position: sticky; top: var(--chrome-h); z-index: 20; width: 100%; text-align: left; font: inherit; color: inherit; cursor: pointer;
    display: grid; grid-template-columns: 92px 1fr 232px 50px 26px; gap: 18px; align-items: center; padding: 12px 12px; background: var(--paper); border-bottom: 1.5px dashed var(--line); }
  .ysec.is-open .ysec__hd { background: var(--ink); color: var(--paper); border-bottom-color: var(--ink); }
  .ysec__hd:hover { background: var(--card); }
  .ysec.is-open .ysec__hd:hover { background: #2c2922; }
  .ysec__yr { font-family: var(--font-display); font-weight: 700; font-size: 23px; line-height: 1; letter-spacing: .5px;
    background: var(--ink); color: var(--paper); padding: 8px 10px; justify-self: start; align-self: center; box-shadow: 2px 2px 0 var(--line); min-width: 40px; text-align: center; }
  .ysec.is-open .ysec__yr { background: var(--paper); color: var(--ink); box-shadow: 2px 2px 0 rgba(243,238,226,.35); }
  .ysec__title { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .ysec__lab { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: 1px; }
  .ysec__meta { font-size: 10px; letter-spacing: .5px; color: var(--ink-soft); }
  .ysec.is-open .ysec__meta { color: rgba(255,255,255,.7); }
  .ysec__meters { display: flex; flex-direction: column; gap: 5px; }
  .ysec__meter { display: grid; grid-template-columns: 62px 1fr 30px; gap: 8px; align-items: center; }
  .ysec__meterlab { font-family: var(--font-mono); font-size: 8px; letter-spacing: 1px; color: var(--ink-soft); }
  .ysec.is-open .ysec__meterlab { color: rgba(255,255,255,.65); }
  .ysec__metern { font-family: var(--font-mono); font-weight: 700; font-size: 10px; text-align: right; }
  .ysec__pct { font-family: var(--font-display); font-weight: 700; font-size: 16px; text-align: right; }
  .ysec__chev { font-size: 15px; text-align: center; }
  .ysec__body { padding: 12px 4px 18px; }

  /* ===== list rows ===== */
  .inv-row { display: grid; grid-template-columns: 42px 1fr 88px 50px 1.5fr 92px 24px; gap: 12px; align-items: center;
    width: 100%; text-align: left; font: inherit; color: inherit; cursor: pointer; background: var(--card); border: 1.5px solid var(--ink); padding: 8px 12px; margin-bottom: 6px; box-shadow: var(--shadow); }
  .inv-row:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .inv-row.is-ghost { background: transparent; border-style: dashed; box-shadow: none; opacity: .72; }
  .inv-thumb { width: 42px; height: 42px; background-color: var(--card); background-image: repeating-linear-gradient(45deg, transparent 0 6px, var(--line-soft) 6px 7px); border: 1.5px solid var(--ink); display: grid; place-items: center; }
  .inv-name { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; }
  .inv-name b { font-family: var(--font-display); font-weight: 700; font-size: 16px; display: flex; flex-wrap: wrap; align-items: center; row-gap: 4px; line-height: 1; }
  .inv-name i { font-style: normal; font-size: 10px; color: var(--ink-soft); line-height: 1.2; margin-top: 3px; }
  .idver { font-style: normal; font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .3px; color: var(--ink-soft); border: 1px solid var(--line-soft); padding: 0 4px; margin-left: 7px; vertical-align: 2px; }
  .vveh-pill { font-style: normal; font-family: var(--font-mono); font-weight: 700; font-size: 8px; letter-spacing: 1px; color: #fff; background: var(--oktober, #3a5a7a); background: oklch(0.5 0.085 245); padding: 1px 5px; margin-left: 8px; vertical-align: 2px; }
  .idveh { display: inline-flex; align-items: center; gap: 6px; margin-top: 4px; font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: .3px; color: var(--ink); background: var(--paper); border: 1.5px solid var(--ink); padding: 2px 7px; box-shadow: 1.5px 1.5px 0 var(--line-soft); }
  .idveh b { font-family: var(--font-display); font-weight: 700; font-size: 8px; letter-spacing: .6px; color: var(--ink-soft); }
  .inv-owned { font-family: var(--font-display); font-weight: 700; font-size: 16px; }
  .inv-ghosttag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); border: 1px dashed var(--line); padding: 3px 7px; }
  .inv-stock { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .inv-stock__done { font-size: 10px; font-weight: 700; letter-spacing: .5px; color: var(--ok); white-space: nowrap; }
  .inv-stock__miss { font-size: 10px; color: var(--ink-soft); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .inv-bar { width: 78px; flex: none; height: 12px; background: var(--paper); border: 1.5px solid var(--ink); overflow: hidden; }
  .inv-bar__fill { height: 100%; background: var(--ink-soft); background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.18) 0 4px, transparent 4px 8px); }
  .inv-bar__fill.is-done { background: var(--ok); }
  .inv-need { font-family: var(--font-mono); font-weight: 700; font-size: 11px; text-align: center; border: 1.5px solid var(--ink); padding: 4px 6px; background: var(--paper); }
  .inv-need.is-zero { background: var(--ok); color: #fff; }
  .inv-need.is-ghost { background: var(--paper); color: var(--accent); border-color: var(--accent); border-style: dashed; }
  .inv-go { font-size: 15px; color: var(--ink-soft); text-align: center; }

  /* ===== gallery ===== */
  .vveh-gallerywrap { display: flex; flex-direction: column; gap: 22px; padding-top: 16px; }
  .vveh-galsec__hd { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid var(--ink); }
  .vveh-galsec__hd .ysec__yr { box-shadow: 2px 2px 0 var(--line); }
  .card { background: var(--card); border: 2px solid var(--ink); box-shadow: var(--shadow); padding: 14px; display: flex; flex-direction: column; gap: 8px; position: relative; }
  .card__corner { position: absolute; top: 10px; right: 10px; }
  .card__photo { height: 132px; }
  .card__name { font-family: var(--font-display); font-weight: 700; font-size: 18px; display: flex; flex-wrap: wrap; align-items: center; row-gap: 4px; line-height: 1; }
  .card__var { font-size: 10px; color: var(--ink-soft); letter-spacing: .5px; margin-top: 3px; }
  .card__foot { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 6px; }
  .card__own { font-family: var(--font-mono); font-size: 11px; font-weight: 700; background: var(--ink); color: var(--paper); padding: 3px 8px; }
  .card__add { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 1px; color: var(--accent); border: 1.5px dashed var(--accent); padding: 4px 9px; }
  .card__multi { font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--ink-soft); border: 1.5px solid var(--ink); padding: 5px 9px; background: var(--paper); }
  .card__multi.is-whole { background: var(--ok); color: #fff; border-color: var(--ok); }
  .inv-galgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 2px 0; }
  .inv-card { font: inherit; text-align: left; cursor: pointer; width: 100%; }
  .inv-card:hover { box-shadow: 5px 5px 0 var(--ink); }
  .card.is-ghostcard { border-style: dashed; opacity: .82; background: transparent; }
  .card.is-ghostcard .card__own { background: var(--ink-soft); }

  /* ===== add-vehicle modal ===== */
  .vmodal-back { position: fixed; inset: 0; background: rgba(33,31,26,.58); display: grid; place-items: center; z-index: 50; padding: 24px; }
  .vmodal { background: var(--paper); border: 2.5px solid var(--ink); box-shadow: 8px 8px 0 rgba(33,31,26,.5); width: 100%; max-width: 480px; display: flex; flex-direction: column; }
  .vmodal__top { background: var(--ink); color: var(--paper); padding: 13px 18px; display: flex; align-items: center; gap: 12px; }
  .vmodal__mk { color: var(--ok); font-size: 18px; font-weight: 700; }
  .vmodal__title { font-family: var(--font-display); font-weight: 700; font-size: 17px; letter-spacing: 1px; flex: 1; }
  .vmodal__title em { font-style: normal; font-family: var(--font-mono); font-size: 10px; opacity: .6; letter-spacing: 0; display: block; margin-top: 1px; }
  .vmodal__x { background: transparent; border: none; color: rgba(255,255,255,.7); font-size: 16px; cursor: pointer; }
  .vmodal__sub { padding: 12px 18px; font-size: 11px; color: var(--ink-soft); line-height: 1.55; border-bottom: 1px dashed var(--line); }
  .vmodal__body { padding: 16px 18px; display: flex; flex-direction: column; gap: 16px; }
  .vfld { display: flex; flex-direction: column; gap: 7px; }
  .vfld__lab { font-family: var(--font-mono); font-weight: 700; font-size: 9px; letter-spacing: 1.5px; color: var(--ink-soft); }
  .vfld__note { font-size: 10px; color: var(--ink-soft); line-height: 1.5; font-style: italic; }
  .vinp { font-family: var(--font-mono); font-size: 13px; color: var(--ink); background: var(--paper); border: 1.5px solid var(--ink); padding: 9px 11px; outline: none; width: 100%; }
  .vinp:focus { box-shadow: var(--shadow); }
  .vmodal__foot { padding: 12px 18px; border-top: 2px solid var(--ink); display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
  .vbtn { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: .5px; background: var(--olive); color: #fff; border: 1.5px solid var(--olive); padding: 9px 14px; cursor: pointer; }
  .vbtn:hover { background: #717f3f; }
  .vbtn:disabled { opacity: .4; cursor: not-allowed; }
  .vbtn--ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
  .vbtn--ghost:hover { background: var(--card); }

  @media (max-width: 900px) {
    .inv-galgrid { grid-template-columns: repeat(2, 1fr); }
    .ysec__hd { grid-template-columns: 64px 1fr 50px 26px; }
    .ysec__meters { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#f3eee2"/>
    <rect x="20" y="48" width="48" height="18" fill="#211f1a"/>
    <rect x="62" y="40" width="20" height="10" fill="#6b6f39"/>
    <circle cx="32" cy="68" r="7" fill="#211f1a"/>
    <circle cx="56" cy="68" r="7" fill="#211f1a"/>
    <rect x="68" y="30" width="3" height="14" fill="#b8402f"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="vehicle-data.jsx"></script>
<script type="text/babel" src="vehicles-app.jsx"></script>
<script type="text/babel">
  const { VehiclesApp } = window;
  ReactDOM.createRoot(document.getElementById('root')).render(<VehiclesApp />);
</script>
</body>
</html>
